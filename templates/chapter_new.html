<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>e>
        /* ========================================
           PHASE 2.6: THE FLUID UI
           CSS Variables + Glassmorphism + Micro-interactions
           ======================================== */

        /* Theme Variables */
        :root {
            /* Dark Mode (Default) */
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #2a2a2a;
            --text-main: #e0e0e0;
            --text-dim: #999;
            --text-ghost: #666;
            --accent: #a78bfa;
            --accent-hover: #8b5cf6;
            --border: #333;
            --shadow: rgba(0, 0, 0, 0.5);
            --glass-bg: rgba(26, 26, 26, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);

            /* Character CSS Variables (Generated) */
            {% for char_class, style in character_styles.items() %}
            --{{ char_class }}-color: {{ style.color }};
            {% endfor %}

            /* Typography */
            --base-font-size: 16px;
            --font-sans: -apple-system,
            BlinkMacSystemFont,
            "Segoe UI",
            Roboto,
            sans-serif;
            --font-serif: Georgia,
            "Times New Roman",
            serif;
            --font-mono: "Courier New",
            Consolas,
            monospace;
        }
